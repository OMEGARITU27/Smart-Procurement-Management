spring.application.name=procurement

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===============================
# Database Configuration (MySQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/procurement_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:riteshmysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.indent-output=true

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:myspringboot2006@gmail.com}
spring.mail.password=${MAIL_PASSWORD:oalibujbxwiihgoo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
procurement.admin.email=${PROCUREMENT_ADMIN_EMAIL:adminritesh@gmail.com}
jwt.secret=${JWT_SECRET:MyJwtSecretKey1234567890MyJwtSecretKey1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
